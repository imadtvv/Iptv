name: Update IPTV

on:
  schedule:
    - cron: "*/30 * * * *"  # كل 30 دقيقة
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Download M3U8
        run: |
          curl "http://1gotv.org:8080/get.php?username=4640441086618762&password=4640441086618762&type=m3u_plus&output=m3u8" -o playlist.m3u8

      - name: Commit & Push
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "iptv@bot.com"
          git add playlist.m3u8
          git commit -m "Update playlist" || echo "No changes"
          git push
